<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transactions | AmarHishab</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/main.css" />
  <link rel="stylesheet" href="../styles/pages/transactions.css" />
</head>
<body data-page-title="Transactions">
  <div class="transactions-layout">
    <div data-partial="../partials/sidebar.html" data-partial-class="transactions-sidebar"></div>

    <main class="transactions-main">
      <section class="container transactions-page">
        <div class="transactions-header">
          <div>
            <h1>Transactions</h1>
            <p>View and manage your transaction history</p>
          </div>

          <div class="transactions-top-actions">
            <button class="btn btn-primary" type="button">
              <span>Add Transaction</span>
            </button>

            <button class="btn btn-outline btn-icon" type="button" aria-label="Search transactions">
              <i data-lucide="search" aria-hidden="true"></i>
            </button>
            <button class="btn btn-outline btn-icon" type="button" aria-label="Notifications">
              <i data-lucide="bell" aria-hidden="true"></i>
            </button>
          </div>
        </div>

        <div class="transactions-filters">
          <button class="btn btn-secondary" type="button">
            <i data-lucide="sliders-horizontal" aria-hidden="true"></i>
            <span>Filter</span>
          </button>
          <button class="btn btn-secondary" type="button">
            <i data-lucide="calendar" aria-hidden="true"></i>
            <span>Date Range</span>
          </button>
        </div>

        <div class="transactions-panel">
          <article class="transaction-item">
            <div class="transaction-item-left">
              <div class="tx-icon tx-icon--pink">
                <i data-lucide="shopping-cart" aria-hidden="true"></i>
              </div>
              <div>
                <h4>Grocery Shopping</h4>
                <p>Food & Dining • 2 Mar, 2026</p>
              </div>
            </div>
            <div class="transaction-amount transaction-amount--negative">-৳450</div>
          </article>

          <article class="transaction-item">
            <div class="transaction-item-left">
              <div class="tx-icon tx-icon--mint">
                <i data-lucide="dollar-sign" aria-hidden="true"></i>
              </div>
              <div>
                <h4>Salary Deposit</h4>
                <p>Salary • 1 Mar, 2026</p>
              </div>
            </div>
            <div class="transaction-amount transaction-amount--positive">+৳5,000</div>
          </article>

          <article class="transaction-item">
            <div class="transaction-item-left">
              <div class="tx-icon tx-icon--cream">
                <i data-lucide="plug" aria-hidden="true"></i>
              </div>
              <div>
                <h4>Electric Bill</h4>
                <p>Bills & Utilities • 28 Feb, 2026</p>
              </div>
            </div>
            <div class="transaction-amount transaction-amount--negative">-৳320</div>
          </article>

          <article class="transaction-item">
            <div class="transaction-item-left">
              <div class="tx-icon tx-icon--mint-soft">
                <i data-lucide="briefcase" aria-hidden="true"></i>
              </div>
              <div>
                <h4>Freelance Work</h4>
                <p>Freelance • 25 Feb, 2026</p>
              </div>
            </div>
            <div class="transaction-amount transaction-amount--positive">+৳1,200</div>
          </article>
        </div>
      </section>
    </main>
  </div>

  <script src="../js/app.js"></script>
</body>
</html>
